<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Slot - Strategic Ranked</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="gamePage" class="page active">
        <div class="game-title">Vib€ $lot</div>
        
        <div id="modeSelection">
            <div class="mode-selector">
                <button id="btn1x3" class="mode-btn active" onclick="setMode('1x3')">CLASSIC 1x3</button>
                <button id="btn3x3" class="mode-btn" onclick="setMode('3x3')">GRID 3x3</button>
            </div>
            <button id="rankedStartBtn" onclick="startRanked()" style="background: linear-gradient(45deg, #ff00ff, #00ffff); color:white; margin: 15px 0; border-radius:50px; padding:12px; width:100%; border:none; cursor:pointer; font-weight:bold; text-transform:uppercase; box-shadow: 0 4px 15px rgba(255,0,255,0.3);">
                🏆 Avvia Scalata Classificata (20 Giri)
            </button>
        </div>

        <div id="rankedStatus" style="display:none; background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #ff00ff; backdrop-filter: blur(10px);">
            <div style="display:flex; justify-content: space-around; align-items: center;">
                <div style="text-align:center;">
                    <span style="font-size:0.7rem; opacity:0.8; display:block; color:#eee;">GIRI RIMANENTI</span>
                    <span id="spinsLeft" style="font-size:1.5rem; font-weight:bold; color:#00ffff;">20</span>
                </div>
                <div style="text-align:center; border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); padding: 0 20px;">
                    <span style="font-size:0.7rem; opacity:0.8; display:block; color:#eee;">VINCITE LORDE</span>
                    <span id="rankedTotal" style="font-size:1.5rem; font-weight:bold; color:#ff00ff;">$ 0</span>
                </div>
                <div style="text-align:center;">
                    <span style="font-size:0.7rem; opacity:0.8; display:block; color:#eee;">IL TUO RECORD</span>
                    <span id="personalBest" style="font-size:1.2rem; font-weight:bold; color:#ffd700;">$ 0</span>
                </div>
            </div>
        </div>

        <div class="wallet-container">
            <div id="currentScore">$ 150</div>
        </div>

        <div class="main-frame" id="mainFrame">
            <div class="grid-wrapper">
                <div id="slotGrid" class="slot-grid grid-1x3"></div>
                <canvas id="winCanvas"></canvas>
            </div>
            
            <button id="spinBtn" onclick="spin()">SPIN (-$10)</button>
            
            <button id="saveBtn" onclick="inviaPunteggio()" style="background:#ff00ff; color:white; margin-top:10px; border-radius:50px; padding:15px; width:100%; border:none; cursor:pointer; font-weight:bold; display:none; animation: pulse 1.5s infinite;">
                🚀 INVIA RECORD IN CLASSIFICA
            </button>

            <div id="betControls" style="margin-top: 20px; display: flex; gap: 8px;">
                <button class="bet-btn active" onclick="setMultiplier(1)">1x</button>
                <button class="bet-btn" onclick="setMultiplier(2)">2x</button>
                <button class="bet-btn" onclick="setMultiplier(3)">3x</button>
                <button class="bet-btn" onclick="setMultiplier(5)">5x</button>
            </div>

            <div class="status-area">
                <div id="message"></div>
                <div id="stats"></div>
            </div>

            <div class="history-container">
                <div class="history-title">Ultime Vincite</div>
                <div id="historyList"></div>
            </div>

            <div class="info-link" onclick="showPage('infoPage')">TABELLA PREMI</div>
        </div>
    </div>

    <div id="infoPage" class="page">
        <h2 id="legendTitle" style="color:var(--accent); text-transform: uppercase;">Tabella Premi</h2>
        <div id="legendContent" style="background:var(--panel); padding:20px; border-radius:25px; width:100%; max-width:450px;"></div>
        <button onclick="showPage('gamePage')" style="margin-top:30px; background:none; border:1px solid white; color:white; padding:10px 30px; border-radius:20px; cursor:pointer;">INDIETRO</button>
    </div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyCoWoMUL4SwIoc8zvYTgt32ge01SvD14X5cHyZQsXVb48bUM5OpOaRWHQmZSe5BqJiUw/exec";

    let userNickname = localStorage.getItem('vibeSlot_nick');
    if (!userNickname || userNickname === "null") {
        userNickname = prompt("Benvenuto! Scegli un nickname per la classifica:") || "Player" + Math.floor(Math.random() * 1000);
        localStorage.setItem('vibeSlot_nick', userNickname);
    }

    const baseSymbolData = { '💎': 1000, '🔥': 500, '⭐': 300, '⚡': 150, '🌈': 100, '🔮': 50 };
    const gridSymbolData = { '💎': 2000, '🔥': 1000, '⭐': 600, '⚡': 300, '🌈': 150, '🔮': 80 };
    const symbols = Object.keys(baseSymbolData);
    
    let score = 150;
    let currentMode = '1x3';
    let currentMultiplier = 1;
    let gridCells = [];
    let history = [];

    // Logica Ranked
    let isRanked = false;
    let spinsRemaining = 20;
    let rankedTotalWin = 0;

    // Spiegazione: Carica il record dal localStorage in base alla modalità (1x3 o 3x3)
    function updatePBDisplay() {
        const pb = localStorage.getItem('vibe_pb_' + currentMode) || 0;
        document.getElementById('personalBest').innerText = `$ ${parseInt(pb).toLocaleString('it-IT')}`;
    }

    function startRanked() {
        const startMsg = currentMode === '1x3' ? 
            "Iniziare Ranked 1x3? Budget: $300. Hai 20 giri per accumulare il massimo delle vincite!" : 
            "Iniziare Ranked 3x3? Budget: $600. Hai 20 giri per accumulare il massimo delle vincite!";
        
        if(!confirm(startMsg)) return;

        isRanked = true;
        spinsRemaining = 20;
        rankedTotalWin = 0;
        score = (currentMode === '1x3') ? 300 : 600;
        
        document.getElementById('modeSelection').style.display = 'none';
        document.getElementById('rankedStatus').style.display = 'flex';
        document.getElementById('saveBtn').style.display = 'none';
        document.getElementById('spinBtn').style.display = 'block';
        
        updatePBDisplay();
        updateRankedUI();
        updateUI();
        updateSpinButtonText();
    }

    function updateRankedUI() {
        document.getElementById('spinsLeft').innerText = spinsRemaining;
        document.getElementById('rankedTotal').innerText = `$ ${rankedTotalWin.toLocaleString()}`;
    }

    function updateUI() {
        document.getElementById('currentScore').innerText = `$ ${score.toLocaleString('it-IT')}`;
    }

    function setMode(mode) {
        if(document.getElementById('spinBtn').disabled || isRanked) return;
        currentMode = mode;
        score = (mode === '1x3') ? 150 : 300;
        updateUI();
        document.getElementById('btn1x3').classList.toggle('active', mode === '1x3');
        document.getElementById('btn3x3').classList.toggle('active', mode === '3x3');
        document.getElementById('slotGrid').className = `slot-grid grid-${mode}`;
        createCells(mode === '1x3' ? 3 : 9);
        updateSpinButtonText();
    }

    function createCells(count) {
        const grid = document.getElementById('slotGrid');
        grid.innerHTML = ''; gridCells = [];
        for(let i=0; i<count; i++) {
            const div = document.createElement('div');
            div.className = 'reel'; div.innerText = '🔮';
            grid.appendChild(div); gridCells.push(div);
        }
    }

    function spin() {
        const cost = (currentMode === '3x3' ? 30 : 10) * currentMultiplier;
        if (score < cost) {
            alert("Budget esaurito!");
            if(isRanked) if(confirm("Inviare il punteggio ottenuto finora?")) endRanked();
            return;
        }
        score -= cost;
        updateUI();
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('message').innerText = "";
        gridCells.forEach(c => { c.classList.remove('winner'); c.classList.add('spinning'); });

        let completed = 0;
        gridCells.forEach((cell, i) => {
            const duration = 600 + (i * 100);
            const startTime = performance.now();
            function anim(now) {
                if (now - startTime < duration) {
                    cell.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                    requestAnimationFrame(anim);
                } else {
                    cell.classList.remove('spinning');
                    completed++;
                    if (completed === gridCells.length) calculateResult();
                }
            }
            requestAnimationFrame(anim);
        });
    }

    function calculateResult() {
        let totalWin = 0, lines = [];
        const data = currentMode === '1x3' ? baseSymbolData : gridSymbolData;
        if (currentMode === '1x3') lines.push(gridCells);
        else {
            lines.push([gridCells[0],gridCells[1],gridCells[2]], [gridCells[3],gridCells[4],gridCells[5]], [gridCells[6],gridCells[7],gridCells[8]],
                       [gridCells[0],gridCells[3],gridCells[6]], [gridCells[1],gridCells[4],gridCells[7]], [gridCells[2],gridCells[5],gridCells[8]],
                       [gridCells[0],gridCells[4],gridCells[8]], [gridCells[2],gridCells[4],gridCells[6]]);
        }

        lines.forEach(line => {
            const vals = line.map(c => c.innerText);
            if (vals[0] === vals[1] && vals[1] === vals[2]) {
                totalWin += (data[vals[0]] * currentMultiplier);
                line.forEach(c => c.classList.add('winner'));
            } else if (currentMode === '1x3' && (vals[0]===vals[1] || vals[1]===vals[2] || vals[0]===vals[2])) {
                totalWin += (20 * currentMultiplier);
                line.forEach(c => { if(vals.filter(v => v === c.innerText).length >= 2) c.classList.add('winner'); });
            }
        });

        score += totalWin;
        if(isRanked) {
            rankedTotalWin += totalWin;
            spinsRemaining--;
            updateRankedUI();
        }
        updateUI();
        if(totalWin > 0) {
            addHistory(totalWin);
            document.getElementById('message').innerText = `VINTI: +$${totalWin}!`;
            document.getElementById('mainFrame').classList.add('shake-anim');
            setTimeout(() => document.getElementById('mainFrame').classList.remove('shake-anim'), 300);
        } else {
            document.getElementById('message').innerText = "RIPROVA";
        }

        if(isRanked && (spinsRemaining <= 0)) endRanked();
        else document.getElementById('spinBtn').disabled = false;
    }

    function endRanked() {
        isRanked = false;
        document.getElementById('spinBtn').style.display = 'none';
        document.getElementById('saveBtn').style.display = 'block';
        document.getElementById('message').innerText = "PARTITA CONCLUSA!";
        document.getElementById('message').style.color = "#00ffff";

        // Spiegazione: Controllo se il punteggio attuale supera il record salvato
        const currentPB = localStorage.getItem('vibe_pb_' + currentMode) || 0;
        if (rankedTotalWin > currentPB) {
            localStorage.setItem('vibe_pb_' + currentMode, rankedTotalWin);
            document.getElementById('message').innerText = "NUOVO RECORD PERSONALE! 🏆";
            updatePBDisplay();
        }
    }

    async function inviaPunteggio() {
        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.innerText = "INVIO IN CORSO...";
        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ 
                    nome: userNickname, 
                    punteggio: rankedTotalWin, 
                    modo: currentMode.toUpperCase() + " RANKED" 
                })
            });
            alert("Record di $" + rankedTotalWin + " inviato con successo!");
            location.reload(); 
        } catch (e) {
            alert("Errore nell'invio!");
            btn.disabled = false;
            btn.innerText = "🚀 INVIA RECORD IN CLASSIFICA";
        }
    }

    function addHistory(amount) {
        history.unshift({ time: new Date().toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'}), amount });
        if(history.length > 5) history.pop();
        document.getElementById('historyList').innerHTML = history.map(h => `<div class="history-item win"><span>${h.time}</span><span>+$${h.amount}</span></div>`).join('');
    }

    function setMultiplier(m) {
        if(document.getElementById('spinBtn').disabled) return;
        currentMultiplier = m;
        document.querySelectorAll('.bet-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === m + 'x'));
        updateSpinButtonText();
    }

    function updateSpinButtonText() {
        const base = currentMode === '3x3' ? 30 : 10;
        document.getElementById('spinBtn').innerText = `SPIN (-$${(base * currentMultiplier).toLocaleString()})`;
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'infoPage') updateLegend();
    }

    function updateLegend() {
        const cont = document.getElementById('legendContent');
        const data = currentMode === '1x3' ? baseSymbolData : gridSymbolData;
        let tableHTML = `<table style="width:100%; text-align: center; font-size: 0.85rem;">
            <thead><tr style="border-bottom: 2px solid var(--accent); color: var(--accent);">
                <th>TRIS</th><th>1x</th><th>2x</th><th>3x</th><th>5x</th>
            </tr></thead><tbody>`;
        for(let s in data) {
            tableHTML += `<tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                <td style="font-size: 1.2rem; padding: 10px;">${s}${s}${s}</td>
                <td>$${data[s]}</td><td>$${data[s]*2}</td><td>$${data[s]*3}</td><td>$${data[s]*5}</td>
            </tr>`;
        }
        tableHTML += `</tbody></table>`;
        cont.innerHTML = tableHTML;
    }

    window.onload = () => { createCells(3); updateUI(); updateSpinButtonText(); };
</script>
</body>
</html>
